name: Sync inventory and publish customer site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: apfr-customer-site
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Check out the site
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Sync Everydayware inventory
        run: ruby sync_inventory.rb

      - name: Prepare customer site
        run: |
          mkdir -p /tmp/apfr-customer-site
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "apfr_server.rb" \
            --exclude "sync_inventory.rb" \
            --exclude "apfr-inventory.html" \
            --exclude "apfr-app.js" \
            --exclude "apfr.css" \
            --exclude "app.js" \
            --exclude "styles.css" \
            --exclude "*.command" \
            ./ /tmp/apfr-customer-site/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload customer site
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/apfr-customer-site

      - name: Deploy customer site
        uses: actions/deploy-pages@v4
